<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Virushka Cafe</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">VIRUSHKA CAFE</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>
    </nav>

    <!-- PAYMENT SECTION -->
    <section class="payment-section">

        <h1>Complete Payment</h1>

        <div class="payment-box">

            <h2>Total: ₹<span id="payment-total">0</span></h2>

            <!-- QR CODE -->
            <img src="images/qr.png"
                 alt="UPI QR Code"
                 class="qr-image">

            <p class="payment-text">
                Scan the QR code and complete your UPI payment, then enter the Transaction ID below.
            </p>

            <!-- TRANSACTION ID ONLY — screenshot removed -->
            <input type="text"
                   id="transaction-id"
                   placeholder="Enter UPI Transaction ID">

            <!-- CONFIRM BUTTON -->
            <button onclick="confirmPayment()">
                Confirm & Place Order
            </button>

        </div>

    </section>

    <script src="js/app.js"></script>

</body>
</html>
