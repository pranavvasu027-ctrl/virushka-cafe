<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>ADMIN LOGIN</h1>

        <input type="text"
               id="username"
               placeholder="Enter Username">

        <input type="password"
               id="password"
               placeholder="Enter Password">

        <button onclick="login()">

            Login

        </button>

        <p id="error-message"></p>

    </div>

</div>

<script>

function login(){

    const username =
        document.getElementById(
            "username"
        ).value.trim();

    const password =
        document.getElementById(
            "password"
        ).value.trim();

    if(
        username === "admin" &&
        password === "virushka123"
    ){

        localStorage.setItem(
            "adminLoggedIn",
            "true"
        );

        window.location.href =
            "admin.html";

    }else{

        document.getElementById(
            "error-message"
        ).innerText =
            "Wrong username or password";
    }
}

</script>

</body>
</html>
